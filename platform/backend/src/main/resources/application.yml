server:
  port: ${SERVER_PORT:8090}
  # Enable HTTPS for the control-plane API in production (#44): provide a keystore and set
  # SERVER_SSL_ENABLED=true. Terminating TLS at an ingress/load balancer is also acceptable.
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEYSTORE:}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:PKCS12}

spring:
  application:
    name: migration-platform
  datasource:
    url: ${METADATA_DB_URL:jdbc:postgresql://localhost:5432/migration_platform}
    username: ${METADATA_DB_USER:postgres}
    password: ${METADATA_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Kafka Connect REST endpoint the control plane proxies (data plane management)
platform:
  connect:
    base-url: ${KAFKA_CONNECT_URL:http://localhost:8083}
    # Bootstrap servers as seen FROM Kafka Connect (used in generated source schema-history config).
    kafka-bootstrap: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    # Basic-auth credentials for a secured Connect REST endpoint (#45). Leave blank for none.
    # Connect must NOT be exposed publicly; only the control plane should reach it.
    username: ${KAFKA_CONNECT_USER:}
    password: ${KAFKA_CONNECT_PASSWORD:}
  crypto:
    # AES-256 key (base64, 32 bytes). MUST be overridden in any real environment.
    # Seeds the Security epic (#43): connection secrets are encrypted at rest, never returned by the API.
    key: ${PLATFORM_CRYPTO_KEY:ZGV2LW9ubHktMzJieXRlLWtleS1jaGFuZ2UtbWUhIQ==}
  auth:
    # HMAC-SHA256 signing key (>= 32 bytes). MUST be overridden in any real environment (#55).
    jwt-secret: ${JWT_SECRET:dev-only-jwt-signing-secret-change-me-please-32b+}
    ttl-minutes: ${JWT_TTL_MINUTES:480}
    # Initial admin, created only when no users exist. Change the password immediately.
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.migration.platform: INFO
