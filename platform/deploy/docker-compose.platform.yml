# Platform control plane (backend + frontend + metadata DB).
# The CDC data plane (Kafka, Connect, Debezium) lives in ../../debezium-setup/docker-compose.yml.
# Run both for a full local environment; the backend talks to Connect via KAFKA_CONNECT_URL.

services:
  metadata-db:
    image: postgres:16
    container_name: platform-metadata-db
    environment:
      POSTGRES_DB: migration_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"   # avoid clashing with a target Postgres on 5432
    volumes:
      - platform-metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ../backend
    container_name: platform-backend
    depends_on:
      metadata-db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8090
      # In containers we use the dedicated metadata-db service, not the embedded DB.
      PLATFORM_METADATA_EMBEDDED: "false"
      METADATA_DB_URL: jdbc:postgresql://metadata-db:5432/migration_platform
      METADATA_DB_USER: postgres
      METADATA_DB_PASSWORD: postgres
      KAFKA_CONNECT_URL: ${KAFKA_CONNECT_URL:-http://host.docker.internal:8083}
      CORS_ALLOWED_ORIGINS: http://localhost:8081
      # Override ALL of these in any real environment (issues #43, #55).
      PLATFORM_CRYPTO_KEY: ${PLATFORM_CRYPTO_KEY:-ZGV2LW9ubHktYWVzMjU2LWtleS1jaGFuZ2UtbWUhISE=}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-signing-secret-change-me-please-32b+}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8090:8090"

  frontend:
    build: ../frontend
    container_name: platform-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  platform-metadata:
