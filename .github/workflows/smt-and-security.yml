name: SMT & Security

# Builds the custom Debezium SMT jar and runs a repo-wide security scan (#62).
# Complements ci.yml (Go) and platform-ci.yml (control plane + UI).
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  smt:
    name: Custom SMT — build & test jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # `package` compiles + runs any SMT unit tests (#58) and produces the shaded jar that the
      # Kafka Connect data plane mounts as a plugin.
      - name: Build SMT jar
        working-directory: debezium-setup/custom-smt
        run: mvn -B clean package
      - name: Upload SMT jar
        uses: actions/upload-artifact@v4
        with:
          name: snake-case-transform
          path: debezium-setup/custom-smt/target/*.jar
          if-no-files-found: error

  connect-image:
    name: Connect image — bake SMT
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # Publish only from main; PR builds validate the Dockerfile without pushing.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main) the SMT-baked Connect image
        uses: docker/build-push-action@v6
        with:
          context: debezium-setup
          file: debezium-setup/Dockerfile.connect
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/connect-snakecase:2.5
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Filesystem scan: dependency vulnerabilities (Maven/npm/Go) + leaked secrets.
      # Fails the build only on fixable CRITICAL issues so the gate is actionable, not noisy.
      - name: Trivy vulnerability & secret scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          # Skip vendored/build artifacts so we scan source + dependency manifests, not bundled
          # third-party wheels or compiled jars.
          skip-dirs: frontend/node_modules,backend/target,debezium-setup/custom-smt/target
