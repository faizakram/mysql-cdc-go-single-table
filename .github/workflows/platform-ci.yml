name: Platform CI

# Control-plane (Java backend) + React UI. Separate from the legacy Go workflow (ci.yml).
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'platform/**'
      - '.github/workflows/platform-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'platform/**'
      - '.github/workflows/platform-ci.yml'

jobs:
  backend:
    name: Backend — unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # `verify` runs surefire (unit) + failsafe (*IT). Testcontainers uses the runner's Docker.
      - name: Build, unit & integration tests
        working-directory: platform/backend
        run: mvn -B clean verify

  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install dependencies
        working-directory: platform/frontend
        run: npm ci
      - name: Type-check & build
        working-directory: platform/frontend
        run: npm run build
      - name: Unit tests (Vitest)
        working-directory: platform/frontend
        run: npm test
      - name: Install Playwright browser
        working-directory: platform/frontend
        run: npx playwright install --with-deps chromium
      - name: E2E smoke (Playwright)
        working-directory: platform/frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: platform/frontend/playwright-report/
          retention-days: 7
