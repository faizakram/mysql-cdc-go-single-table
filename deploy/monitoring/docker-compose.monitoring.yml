# Observability stack for the migration platform (#50/#51): Prometheus (metrics),
# Grafana (dashboards), Loki + promtail (centralized logs).
#
# Joins the existing cdc-dataplane network so Prometheus can scrape platform-backend:8090 and
# connect:9404. Bring the platform + data plane up first, then:
#   docker compose -f deploy/monitoring/docker-compose.monitoring.yml up -d
# Grafana: http://localhost:3000  (admin / admin)  — dashboard "Migration Platform — Overview".
name: cdc-monitoring

networks:
  default:
    name: cdc-dataplane_default
    external: true

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prom-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d

  grafana:
    image: grafana/grafana:11.2.0
    # Host 3000 is often taken (e.g. another dev server); expose on 3001.
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]

  loki:
    image: grafana/loki:3.1.1
    ports: ["3100:3100"]
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.1.1
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]

volumes:
  prom-data:
  grafana-data:
