# Control-plane configuration. Non-secret values in the ConfigMap; secrets in the Secret.
# The Secret here is a TEMPLATE — populate it from a real secrets manager (#43), never commit
# real values. In production prefer an ExternalSecret (External Secrets Operator) or a Vault
# Agent sidecar over a static Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: cdc-platform
data:
  SERVER_PORT: "8090"
  # Use an external, HA Postgres for metadata in production (not the embedded in-process DB).
  PLATFORM_METADATA_EMBEDDED: "false"
  METADATA_DB_URL: "jdbc:postgresql://metadata-postgres-rw.cdc-platform.svc:5432/migration_platform"
  KAFKA_CONNECT_URL: "http://connect-cluster-connect-api.cdc-platform.svc:8083"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.cdc-platform.svc:9092"
  CORS_ALLOWED_ORIGINS: "https://cdc.example.com"
  ALERTS_LAG_THRESHOLD: "100000"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: cdc-platform
type: Opaque
stringData:
  # TEMPLATE ONLY — replace via your secrets manager. See platform/docs/SECURITY-database-accounts.md.
  METADATA_DB_USER: "REPLACE_ME"
  METADATA_DB_PASSWORD: "REPLACE_ME"
  PLATFORM_CRYPTO_KEY: "REPLACE_ME_BASE64_32_BYTES"
  JWT_SECRET: "REPLACE_ME_AT_LEAST_32_BYTES"
  KAFKA_CONNECT_USER: "REPLACE_ME"
  KAFKA_CONNECT_PASSWORD: "REPLACE_ME"
