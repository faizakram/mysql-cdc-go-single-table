server:
  port: ${SERVER_PORT:8090}
  # Enable HTTPS for the control-plane API in production (#44): provide a keystore and set
  # SERVER_SSL_ENABLED=true. Terminating TLS at an ingress/load balancer is also acceptable.
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEYSTORE:}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:PKCS12}

spring:
  application:
    name: migration-platform
  datasource:
    url: ${METADATA_DB_URL:jdbc:postgresql://localhost:5432/migration_platform}
    username: ${METADATA_DB_USER:postgres}
    password: ${METADATA_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Kafka Connect REST endpoint the control plane proxies (data plane management)
platform:
  metadata:
    # true (default): run an embedded in-process Postgres for the app's own state — no external
    # DB / Docker needed to start. false: use an external managed Postgres via spring.datasource.*
    # (recommended for production / multiple app instances).
    embedded: ${PLATFORM_METADATA_EMBEDDED:true}
    embedded-data-dir: ${PLATFORM_METADATA_DATA_DIR:${user.home}/.migration-platform/pgdata}
  connect:
    base-url: ${KAFKA_CONNECT_URL:http://localhost:8083}
    secrets:
      # How DB passwords are placed into generated connector configs (#43):
      #   inline (default) — plaintext in the config (rely on locked-down Connect REST, #45)
      #   file  — emit ${file:<path>/<role>.properties:password}, resolved by Connect's
      #           FileConfigProvider from a mounted secret (secrets manager / K8s secret)
      #   env   — emit ${env:CDC_SECRET_<ROLE>_PASSWORD}, resolved by EnvVarConfigProvider
      mode: ${CONNECT_SECRET_MODE:inline}
      file-path: ${CONNECT_SECRET_FILE_PATH:/opt/connect-secrets}
      env-prefix: ${CONNECT_SECRET_ENV_PREFIX:CDC_SECRET_}
    # Bootstrap servers as seen FROM Kafka Connect (used in generated source schema-history config).
    kafka-bootstrap: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    # Basic-auth credentials for a secured Connect REST endpoint (#45). Leave blank for none.
    # Connect must NOT be exposed publicly; only the control plane should reach it.
    username: ${KAFKA_CONNECT_USER:}
    password: ${KAFKA_CONNECT_PASSWORD:}
  crypto:
    # AES-256 key (base64, 32 bytes). MUST be overridden in any real environment.
    # Seeds the Security epic (#43): connection secrets are encrypted at rest, never returned by the API.
    key: ${PLATFORM_CRYPTO_KEY:ZGV2LW9ubHktYWVzMjU2LWtleS1jaGFuZ2UtbWUhISE=}
  reconciliation:
    # Scheduled drift-detection reconciliation (#49). Runs only for projects opted in
    # (config.autoReconcile = true). Default: every 6 hours.
    cron: ${RECONCILIATION_CRON:0 0 */6 * * *}
  validation:
    # Integrity validation job tunables (#152), for scaling the report to millions of rows.
    # Per-query JDBC timeout so one giant table can't hang a run; a timeout surfaces as that
    # table's ERROR. 0 disables. Default: 5 minutes.
    query-timeout-seconds: ${VALIDATION_QUERY_TIMEOUT_SECONDS:300}
    # Source primary keys sampled for the missing-row check.
    missing-sample-size: ${VALIDATION_MISSING_SAMPLE_SIZE:1000}
    # When true, source/target row counts use fast engine catalog statistics (e.g. PostgreSQL
    # reltuples) instead of exact COUNT(*) — much cheaper on huge tables, but approximate.
    approximate-counts: ${VALIDATION_APPROXIMATE_COUNTS:false}
    # When sampled source rows look missing on the target, wait this long and re-check those exact
    # keys before failing — under live load the freshest rows are simply in flight (CDC lag) and
    # arrive within the settle window, so they resolve to SYNCING instead of a false FAIL (#166).
    # 0 disables the re-check. Default 4s.
    recheck-settle-ms: ${VALIDATION_RECHECK_SETTLE_MS:4000}
  alerts:
    # Optional Slack/Teams/custom incoming-webhook URL for notifications (#52). Empty = log only.
    webhook-url: ${ALERTS_WEBHOOK_URL:}
    # How often to check connector health for alerting. Default: every 2 minutes.
    monitor-cron: ${ALERTS_MONITOR_CRON:0 */2 * * * *}
    # Raise a LAG alert when a project's sink consumer-group lag exceeds this many records (#28).
    # 0 disables lag alerting.
    lag-threshold: ${ALERTS_LAG_THRESHOLD:0}
  monitoring:
    live:
      # Live sync monitor (#168): tails the CDC topics as a Kafka consumer for real-time per-table
      # throughput + lag, pushed to the UI over SSE. Independent consumer group — no sink impact.
      enabled: ${MONITORING_LIVE_ENABLED:true}
      window-seconds: ${MONITORING_LIVE_WINDOW_SECONDS:10}
  metrics:
    # How often (ms) to refresh per-project Prometheus gauges (lag, connector up/down) from live
    # connector health (#50). Lower = fresher dashboards, more calls to Kafka Connect.
    refresh-ms: ${METRICS_REFRESH_MS:15000}
  orchestrator:
    # Max orchestrated tasks (full-load / validation) running at once across all projects (#54).
    # Excess submissions queue (backpressure); at most one task per project runs concurrently.
    max-concurrent: ${ORCHESTRATOR_MAX_CONCURRENT:2}
  scheduler:
    # How often to check for due schedules (#53). Spring 6-field cron. Default: every 30s.
    sweep-cron: ${SCHEDULER_SWEEP_CRON:*/30 * * * * *}
  audit:
    # How long to retain audit-log entries before the daily retention sweep deletes them (#57).
    retention-days: ${AUDIT_RETENTION_DAYS:90}
  auth:
    # HMAC-SHA256 signing key (>= 32 bytes). MUST be overridden in any real environment (#55).
    jwt-secret: ${JWT_SECRET:dev-only-jwt-signing-secret-change-me-please-32b+}
    ttl-minutes: ${JWT_TTL_MINUTES:480}
    # Initial admin, created only when no users exist. Change the password immediately.
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      # Kubernetes liveness/readiness probes (#125): exposes /actuator/health/{liveness,readiness}
      # which deploy/k8s/20-platform-backend.yaml probes. Readiness includes the metadata DB.
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.migration.platform: INFO
