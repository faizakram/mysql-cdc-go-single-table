server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend control plane
    location /api/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Server-Sent Events (live CDC monitor) need streaming, not buffering. Without these, nginx
        # buffers the response and proxies over HTTP/1.0, so the EventSource never receives events and
        # reconnects in a loop. proxy_buffering off streams each frame through; HTTP/1.1 + empty
        # Connection keeps the upstream connection alive; the long read timeout matches the 30-min SSE.
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
